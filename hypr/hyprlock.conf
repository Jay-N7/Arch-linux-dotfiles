background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}
# TIME (12-hour format)
label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    font_size = 60

    position = 0, 150
    halign = center
    valign = center
}

# DATE (placed below time to avoid overlap)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22

    position = 0, 90
    halign = center
    valign = center
}

# INPUT FIELD (password box)
input-field {
    monitor =

    size = 300, 50
    position = 0, -80   # below center
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255,255,255,0.3)
    inner_color = rgba(0,0,0,0.4)
    font_color = rgba(255,255,255,1.0)

    fade_on_empty = false
    placeholder_text = Enter Password...
}
