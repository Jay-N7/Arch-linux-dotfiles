monitor=,preferred,auto,1


exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon
exec = waybar
exec-once = swaync & hypridle
exec-once = blueman-applet
exec-once = wl-paste --watch cliphist store
exec-once = swww img /home/archer/Downloads/wallpapers/hk.jpg
exec-once = ~/scripts/battery-watch.sh
exec-once = clipman store &
exec-once = sudo powertop --auto-tune
# Keyring for Nextcloud and other apps
exec-once = export XDG_RUNTIME_DIR=/run/user/1000; /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg



input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 11
    border_size = 2
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    #col.active_border = rgb(e3ecf3)
    col.active_border = rgb(ff007f)
    col.inactive_border = rgba(000000ff)
    #col.inactive_border = rgba(3b82f6ff)
    layout = dwindle
    resize_on_border = true
}

misc {
    disable_hyprland_logo = yes
   
}

decoration {
    rounding = 2
    rounding_power = 3

    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.10, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

gesture = 3, horizontal, workspace
gesture = 3, down, mod: ALT, close
#windowrulev2 = animation popin,class:^(kitty)$,title:^(update-sys)$
#windowrulev2 = animation popin,class:^(thunar)$
#windowrulev2 = animation popin,class:^(chromium)$
#windowrulev2 = move cursor -3% -105%,class:^(wofi)$
#windowrulev2 = animation popin,class:^(wofi)$
#windowrulev2 = float, class:^(blueman-manager)$
#windowrulev2 = float, class:^(org.gnome.Calculator)$
##windowrulev2 = opacity 0.7 0.7, class:^(.*)$
##windowrulev2 = opacity 0.8 0.8,class:^(kitty)$
##windowrulev2 = opacity 0.8 0.8,class:^(thunar)$
##windowrulev2 = opacity 0.8 0.7,class:^(wofi)$
##windowrulev2 = float, class:^(thunar)$
##windowrulev2 = opacity 0.90 0.90, class:^(org\.qutebrowser\.qutebrowser)$

windowrule {
  name = thunar
  match:class = thunar 
  float = true
  border_size = 1
}

#windowrule {
#  name = opacity
#  match:float = false 
#  opacity = 0.90 0.90
#}
#windowrule {
#  name = float-opacity
#  match:class = kitty
#  opacity = 0.85 0.85
#}
windowrule {
  name = blueman-floating
  match:class = blueman-manager

  float = true
  border_size = 1
}
windowrule {
  name = calculator-floating
  match:class = calculator

  float = true
  border_size = 10
}




$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, M, exec, wlogout --protocol layer-shell
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V,exec, hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 70% 70% && hyprctl dispatch centerwindow
bind = $mainMod, SPACE, exec, env XDG_CURRENT_DESKTOP=Hyprland wofi --show drun --style ~/.config/wofi/style.css
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f -
bind = ALT, V, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, W, exec, ~/scripts/change_wallpaper.sh
bind = $mainMod, B, exec, ~/scripts/toggle-waybar.sh
bind = $mainMod SHIFT, B, exec, ~/scripts/change_waybar.sh
bind = $mainMod,Y,exec,sh -c 'cliphist list | wofi --show dmenu | cliphist decode | wl-copy'

# Waybar switcher (if using HyprV scripts)
# bind = $mainMod, T, exec, ~/.config/HyprV/hyprv_util vswitch

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1

bind = $mainMod SHIFT, right, movetoworkspace, e+1
bind = $mainMod SHIFT, left, movetoworkspace, e-1

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Volume up (F2)
bind = ,XF86AudioRaiseVolume, exec, pamixer --increase 5

# Volume down (F3)
bind = ,XF86AudioLowerVolume, exec, pamixer --decrease 5

# Mute toggle (F4 for example)
bind = ,XF86AudioMute, exec, pamixer --toggle-mute


# Brightness up (F12)
bind = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+

# Brightness down (F11)
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

#make thunar default file manager
$fileManager = thunar
$menu = wofi --show drun




